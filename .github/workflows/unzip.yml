name: Unzip tobest_monorepo

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Extract ZIP into project
        run: |
          unzip -o "tobest_monorepo.zip" -d .
          rm -f tobest_monorepo.zip

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Extract tobest_monorepo.zip" || echo "No changes to commit"
          git push
